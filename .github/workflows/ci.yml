name: Deploy Databricks Asset Bundle

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DATABRICKS_HOST: https://dbc-0b58cee6-85ce.cloud.databricks.com
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Check Databricks current user
        run: databricks current-user me

      - name: Test workspace folder permission
        run: databricks workspace mkdirs /Workspace/Users/aimanramli.8@gmail.com/github_action_test_folder

      - name: Validate Databricks Bundle
        working-directory: ./youtube_project_bundle
        run: databricks bundle validate -t prod

      - name: Deploy Databricks Bundle
        working-directory: ./youtube_project_bundle
        run: databricks bundle deploy -t prod
